name: Auto Analysis

on:
  schedule:
    # Every hour — 1 job × ~2 min × 24h × 30 days = ~1440 min/month (under 2000 free-tier limit)
    # Previous: */5 with 4 parallel jobs = 48 min/hour → quota exhausted in ~41 hours
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch index (0-5). Leave empty to run all.'
        required: false
        default: 'all'

jobs:
  auto-analyze:
    name: Analyze all pairs + check signals
    runs-on: ubuntu-latest
    steps:
      - name: Run all batches and signal check in parallel
        run: |
          echo "Starting auto-analysis at $(date -u)"

          # Run all 4 endpoints in parallel, wait for all to finish
          curl -sf --max-time 70 \
            "${{ secrets.APP_URL }}/api/analyze/auto?secret=${{ secrets.AUTO_ANALYZE_SECRET }}&batch=0" \
            -o /tmp/batch0.json &
          PID0=$!

          curl -sf --max-time 70 \
            "${{ secrets.APP_URL }}/api/analyze/auto?secret=${{ secrets.AUTO_ANALYZE_SECRET }}&batch=1" \
            -o /tmp/batch1.json &
          PID1=$!

          curl -sf --max-time 70 \
            "${{ secrets.APP_URL }}/api/analyze/auto?secret=${{ secrets.AUTO_ANALYZE_SECRET }}&batch=2" \
            -o /tmp/batch2.json &
          PID2=$!

          curl -sf --max-time 70 \
            "${{ secrets.APP_URL }}/api/analyze/auto?secret=${{ secrets.AUTO_ANALYZE_SECRET }}&batch=3" \
            -o /tmp/batch3.json &
          PID3=$!

          curl -sf --max-time 70 \
            "${{ secrets.APP_URL }}/api/analyze/auto?secret=${{ secrets.AUTO_ANALYZE_SECRET }}&batch=4" \
            -o /tmp/batch4.json &
          PID4=$!

          curl -sf --max-time 70 \
            "${{ secrets.APP_URL }}/api/analyze/auto?secret=${{ secrets.AUTO_ANALYZE_SECRET }}&batch=5" \
            -o /tmp/batch5.json &
          PID5=$!

          curl -sf --max-time 70 \
            "${{ secrets.APP_URL }}/api/signals/auto-check?secret=${{ secrets.AUTO_ANALYZE_SECRET }}" \
            -o /tmp/signals.json &
          PID6=$!

          # Wait for all background jobs (batches 0-5 + signal check)
          wait $PID0 $PID1 $PID2 $PID3 $PID4 $PID5 $PID6

          echo "=== Batch 0 ==="; cat /tmp/batch0.json 2>/dev/null || echo "failed"
          echo "=== Batch 1 ==="; cat /tmp/batch1.json 2>/dev/null || echo "failed"
          echo "=== Batch 2 ==="; cat /tmp/batch2.json 2>/dev/null || echo "failed"
          echo "=== Batch 3 ==="; cat /tmp/batch3.json 2>/dev/null || echo "failed"
          echo "=== Batch 4 ==="; cat /tmp/batch4.json 2>/dev/null || echo "failed"
          echo "=== Batch 5 ==="; cat /tmp/batch5.json 2>/dev/null || echo "failed"
          echo "=== Signals ==="; cat /tmp/signals.json 2>/dev/null || echo "failed"

          echo "Done at $(date -u)"
