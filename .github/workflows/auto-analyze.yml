name: Auto Analysis

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULE LOGIC (single */5 trigger, TF rotation based on current time):
#   Every  5 min → always runs 5m TF
#   Every 15 min → also runs 15m TF  (when minute % 15 == 0)
#   Every  1 h   → also runs 1h TF   (when minute == 0)
#   Every  4 h   → also runs 4h TF   (when minute == 0 AND hour % 4 == 0)
#
# PAIRS: top-15 sorted by price (BTC→ETH→BNB…), batches 0/1/2 (5 pairs each)
#
# ⚠️ QUOTA NOTE (private repos — 2 000 min/month free tier):
#   */5 cron × ~2 min/run × 12 runs/hr × 24h × 30 days ≈ 17 280 min/month
#   → exceeds free tier in ~3.5 days on PRIVATE repos.
#   PUBLIC repo = unlimited minutes (no issue).
#   Alternative: keep 0 * * * * (hourly) to stay within free-tier budget.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      tf:
        description: 'Timeframe to analyze (5m | 15m | 1h | 4h | all). Default: auto-detect.'
        required: false
        default: ''

jobs:
  auto-analyze:
    name: Analyze pairs + check signals
    runs-on: ubuntu-latest
    steps:
      - name: Detect timeframes to run
        id: tfs
        run: |
          # Manual override from workflow_dispatch
          MANUAL="${{ github.event.inputs.tf }}"
          if [ -n "$MANUAL" ]; then
            if [ "$MANUAL" = "all" ]; then
              echo "list=5m 15m 1h 4h" >> $GITHUB_OUTPUT
            else
              echo "list=$MANUAL" >> $GITHUB_OUTPUT
            fi
            echo "Manually triggered: $MANUAL"
            exit 0
          fi

          # Auto-detect based on UTC time
          MIN=$((10#$(date -u +%M)))
          HOUR=$((10#$(date -u +%H)))
          LIST="5m"
          [ $((MIN % 15)) -eq 0 ] && LIST="$LIST 15m"
          [ "$MIN" -eq 0 ]        && LIST="$LIST 1h"
          [ "$MIN" -eq 0 ] && [ $((HOUR % 4)) -eq 0 ] && LIST="$LIST 4h"

          echo "list=$LIST" >> $GITHUB_OUTPUT
          echo "Running TFs: $LIST (minute=$MIN, hour=$HOUR)"

      - name: Run all batches and signal check in parallel
        env:
          APP_URL: ${{ secrets.APP_URL }}
          SECRET:  ${{ secrets.AUTO_ANALYZE_SECRET }}
        run: |
          echo "Starting auto-analysis at $(date -u)"
          TF_LIST="${{ steps.tfs.outputs.list }}"
          echo "Timeframes: $TF_LIST"

          PIDS=()

          # Launch one curl per batch per TF (all in background)
          for TF in $TF_LIST; do
            for BATCH in 0 1 2; do
              curl -sf --max-time 70 \
                "${APP_URL}/api/analyze/auto?secret=${SECRET}&batch=${BATCH}&tf=${TF}" \
                -o "/tmp/r_${TF}_${BATCH}.json" &
              PIDS+=($!)
            done
          done

          # Wait for analysis to finish before checking outcomes
          wait "${PIDS[@]}"

          # Signal / outcome check runs AFTER analysis to avoid race conditions
          curl -sf --max-time 70 \
            "${APP_URL}/api/signals/auto-check?secret=${SECRET}" \
            -o /tmp/signals.json

          # Print results
          for TF in $TF_LIST; do
            for BATCH in 0 1 2; do
              echo "=== ${TF} Batch ${BATCH} ==="
              cat "/tmp/r_${TF}_${BATCH}.json" 2>/dev/null || echo "failed"
            done
          done
          echo "=== Signals check ==="
          cat /tmp/signals.json 2>/dev/null || echo "failed"

          echo "Done at $(date -u)"
