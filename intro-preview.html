<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KotvukAI — Превью интро</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#06080f; --cyan:#00d4ff; --purple:#a855f7; --green:#00e676; --red:#ff3d57;
    --txt:#e8f0fb; --muted:#7a8aa0; --dim:#3a4a5a; --line:rgba(255,255,255,.08);
  }
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;overflow-x:hidden}
  h1,h2,h3,.syne{font-family:'Syne',sans-serif}
  a{text-decoration:none;color:inherit}

  .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .blob{position:absolute;border-radius:50%;filter:blur(60px)}
  .b1{top:-10%;left:10%;width:560px;height:560px;background:radial-gradient(circle,rgba(0,212,255,.18),transparent 60%);animation:float1 18s ease-in-out infinite}
  .b2{top:20%;right:5%;width:480px;height:480px;background:radial-gradient(circle,rgba(168,85,247,.18),transparent 60%);animation:float2 22s ease-in-out infinite}
  .b3{bottom:-5%;left:40%;width:420px;height:420px;background:radial-gradient(circle,rgba(0,230,118,.12),transparent 60%);animation:float3 20s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.15)}}
  @keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,60px) scale(1.2)}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-40px) scale(1.1)}}
  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 50% at 50% 0%,#000 40%,transparent 100%);opacity:.4}
  .wrap{position:relative;z-index:1}

  nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:14px 40px;backdrop-filter:blur(16px);background:rgba(6,8,15,.6);border-bottom:1px solid var(--line)}
  .logo{display:flex;align-items:center;gap:11px;font-family:'Syne';font-weight:800;font-size:1.05rem;letter-spacing:-.02em}
  .logo svg{width:30px;height:30px;display:block}
  .navlinks{display:flex;gap:6px}
  .navlinks a{color:var(--muted);font-size:.66rem;letter-spacing:.08em;padding:6px 14px;transition:color .2s}
  .navlinks a:hover{color:var(--txt)}
  .navright{display:flex;gap:10px;align-items:center}
  .lang{display:flex;gap:2px;border:1px solid var(--line);border-radius:8px;padding:2px;background:rgba(255,255,255,.02)}
  .lang button{background:none;border:none;color:var(--muted);font-family:inherit;font-size:.62rem;letter-spacing:.06em;padding:5px 9px;border-radius:6px;cursor:pointer;transition:.2s}
  .lang button.on{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;font-weight:700}
  .btn{padding:8px 20px;font-size:.7rem;letter-spacing:.05em;border-radius:8px;transition:transform .2s,box-shadow .2s,border-color .2s,color .2s;cursor:pointer;display:inline-block}
  .btn-ghost{border:1px solid #2c3340;color:var(--muted)}
  .btn-ghost:hover{color:var(--txt);border-color:rgba(255,255,255,.25)}
  .btn-fill{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;font-weight:700}

  .ticker{margin-top:59px;border-bottom:1px solid var(--line);overflow:hidden;white-space:nowrap;background:rgba(10,15,30,.4)}
  .ticker-track{display:inline-block;padding:9px 0;animation:scroll 40s linear infinite}
  .ticker-track span{font-size:.66rem;margin:0 22px;color:var(--muted)}
  .ticker-track b{color:var(--txt);font-weight:600}
  .up{color:var(--green)} .down{color:var(--red)}
  @keyframes scroll{to{transform:translateX(-50%)}}

  .hero{min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 70px}
  .badge{display:inline-flex;align-items:center;gap:9px;font-size:.64rem;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;
    padding:7px 16px;border:1px solid rgba(0,212,255,.25);border-radius:100px;background:rgba(0,212,255,.04);margin-bottom:30px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
  .hero h1{font-weight:800;font-size:clamp(3rem,8.5vw,6.8rem);line-height:.98;letter-spacing:-.05em;max-width:1000px;margin-bottom:26px;perspective:800px}
  .hero h1 .line{display:block;overflow:hidden}
  .hero h1 .word{display:inline-block;transform-origin:bottom;margin:0 .12em}
  .l1 .word{background:linear-gradient(120deg,#fff,#dceeff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .l2 .word{background:linear-gradient(120deg,var(--cyan),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hero p.sub{font-size:clamp(.9rem,2vw,1.1rem);color:var(--muted);max-width:560px;line-height:1.75;margin-bottom:42px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:54px}
  .btn-lg{padding:16px 44px;font-size:.9rem;border-radius:10px}
  .mag{will-change:transform}
  .chips{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .chip{padding:14px 26px;border:1px solid var(--line);border-radius:12px;background:rgba(10,15,30,.5);backdrop-filter:blur(14px);min-width:120px;transition:transform .25s,border-color .25s}
  .chip:hover{transform:translateY(-5px) scale(1.03);border-color:rgba(0,212,255,.4)}
  .chip .v{font-family:'Syne';font-size:1.8rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .chip .l{font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}

  /* hero entrance: 3D flip-up words */
  .word{opacity:0;transform:translateY(110%) rotateX(-70deg)}
  .hero.go .word{animation:flipUp .85s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes flipUp{to{opacity:1;transform:none}}
  .he{opacity:0;animation:fadeScale .8s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes fadeScale{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}

  /* varied reveals */
  .r-up{opacity:0;transform:translateY(40px)}
  .r-left{opacity:0;transform:translateX(-60px)}
  .r-right{opacity:0;transform:translateX(60px)}
  .r-scale{opacity:0;transform:scale(.8)}
  .r-rot{opacity:0;transform:translateY(40px) rotate(-4deg)}
  .r-up,.r-left,.r-right,.r-scale,.r-rot{transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
  .in{opacity:1!important;transform:none!important}
  .stag>*{transition-delay:calc(var(--i,0)*.08s)}

  section.blk{max-width:1100px;margin:0 auto;padding:100px 32px}
  .eyebrow{font-size:.64rem;color:var(--cyan);letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px}
  .blk h2{font-size:clamp(2rem,4.5vw,3.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:18px;max-width:620px}
  .blk .lead{color:var(--muted);max-width:540px;line-height:1.7;font-size:.92rem;margin-bottom:48px}
  .feat{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
  .card{padding:28px;border:1px solid var(--line);border-radius:16px;background:rgba(12,18,32,.5);backdrop-filter:blur(12px);transition:border-color .3s,background .3s;transform-style:preserve-3d;will-change:transform}
  .card:hover{border-color:rgba(0,212,255,.3);background:rgba(14,22,40,.7)}
  .card .ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:18px;border:1px solid var(--line);transform:translateZ(30px)}
  .card h3{font-size:1.05rem;font-weight:700;margin-bottom:10px;transform:translateZ(20px)}
  .card p{color:var(--muted);font-size:.82rem;line-height:1.6;transform:translateZ(10px)}

  .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
  .step{position:relative;padding:28px;border:1px solid var(--line);border-radius:16px;background:rgba(12,18,32,.4)}
  .step .n{font-family:'Syne';font-size:2.6rem;font-weight:800;line-height:1;opacity:.25;margin-bottom:14px}
  .step h3{font-size:1.05rem;margin-bottom:8px}.step p{color:var(--muted);font-size:.82rem;line-height:1.6}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .metric{background:var(--bg);padding:34px 20px;text-align:center}
  .metric .v{font-family:'Syne';font-size:2.6rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .metric .l{font-size:.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:8px}

  .finalcta{text-align:center;padding:120px 24px}
  .finalcta h2{font-size:clamp(2.2rem,5vw,3.6rem);font-weight:800;letter-spacing:-.03em;margin-bottom:20px}
  .finalcta p{color:var(--muted);max-width:460px;margin:0 auto 36px;line-height:1.7}
  footer{border-top:1px solid var(--line);padding:30px 40px;text-align:center;color:var(--dim);font-size:.66rem}
  @media(max-width:680px){nav{padding:12px 16px}.navlinks{display:none}section.blk{padding:70px 20px}}
</style>
</head>

  function setLang(l){
    document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(I18N[l][k]!=null)el.innerHTML=I18N[l][k]});
    document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
    document.documentElement.lang=l;
  }
  document.querySelectorAll('.lang button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.l)));
  setLang('ru');

  // hero word flip
  requestAnimationFrame(()=>{
    const hero=document.getElementById('hero'); hero.classList.add('go');
    hero.querySelectorAll('.word').forEach((w,i)=>w.style.animationDelay=(.15+i*.1)+'s');
  });

  // scroll reveals with stagger
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){
    const sib=[...e.target.parentElement.children].filter(c=>c.matches('.r-up,.r-left,.r-right,.r-scale,.r-rot'));
    e.target.style.transitionDelay=(sib.indexOf(e.target)*0.08)+'s';
    e.target.classList.add('in');io.unobserve(e.target);
    if(e.target.querySelector('.count'))e.target.querySelectorAll('.count').forEach(countUp);
  }})},{threshold:.16});
  document.querySelectorAll('.r-up,.r-left,.r-right,.r-scale,.r-rot').forEach(el=>io.observe(el));

  // count-up
  function countUp(el){const to=+el.dataset.to,suf=el.dataset.suf||'';let c=0;const st=Math.max(1,Math.ceil(to/40));
    const id=setInterval(()=>{c+=st;if(c>=to){el.textContent=to+suf;clearInterval(id)}else el.textContent=c+suf},28)}

  // 3D tilt cards
  document.querySelectorAll('.tilt').forEach(card=>{
    card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
      card.style.transform=`perspective(700px) rotateY(${x*10}deg) rotateX(${-y*10}deg) translateY(-6px)`});
    card.addEventListener('mouseleave',()=>card.style.transform='');
  });

  // magnetic buttons
  document.querySelectorAll('.mag').forEach(btn=>{
    btn.addEventListener('mousemove',e=>{const r=btn.getBoundingClientRect();btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.25}px,${(e.clientY-r.top-r.height/2)*.4}px)`});
    btn.addEventListener('mouseleave',()=>btn.style.transform='');
  });

  // ticker loop
  const tk=document.getElementById('tk');tk.innerHTML+=tk.innerHTML;
</script>
